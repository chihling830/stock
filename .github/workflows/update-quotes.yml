name: Update Quotes

on:
  schedule:
    - cron: "30 10 * * 1-5"
    - cron: "30 15 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quotes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yfinance pandas

      - name: Update quotes
        run: |
          python update_quotes.py

      - name: Commit and push quotes.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add quotes.json
          git commit -m "Update quotes" || echo "No changes to commit"
          git push
